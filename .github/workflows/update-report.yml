name: Update Sprint Report

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run report generator
        env:
          ADO_ORG: GradaBookport
          ADO_PROJECT: CentralniSystem
          ADO_TEAM: PowerApps 2026
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: node generate.js

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update sprint report $(date +'%Y-%m-%d')"
          git push
